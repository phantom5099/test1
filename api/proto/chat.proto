syntax = "proto3";

package chat.v1;

// Go 专用选项：定义生成的 .pb.go 文件应该存放在哪个路径以及包名是什么
option go_package = "go-llm-demo/api/proto";

// --- 辅助结构定义 ---

// Status 用于统一后端向前端反馈的执行状态（错误处理机制）
// 建议方案：在响应体中预留 status 字段，包含错误码和错误信息。
message Status {
  // 状态码：0 代表成功；
  // 常见错误码建议：401(身份验证失败), 429(请求过于频繁), 500(模型内部错误)
  int32 code = 1;

  // 错误详细信息：当 code 非 0 时，这里存放给人看的提示文字
  string message = 2;
}

// ResponseMetadata 用于存放非对话正文的辅助数据（流式控制与元数据）
// 建议方案：暂不引入复杂的“心跳包”，但在首个包或末尾包中预留 metadata 字段用于传递模型信息。
message ResponseMetadata {
  // 当前实际产生响应的模型名称（用于在 TUI 状态栏同步显示，应对 /switch 场景）
  string model_name = 1;

  // 本次对话消耗的 Token 统计（可选，用于后期性能分析）
  int32 usage_tokens = 2;
}

// --- 核心业务结构定义 ---

// Message 定义单条对话的内容
message Message {
  // 角色：只能是 "user", "assistant", "system"
  string role = 1;

  // 对话正文
  string content = 2;
}

// ChatRequest 定义前端发起的对话请求契约
// 字段命名规范：遵循 Protobuf 全球标准 (snake_case)
message ChatRequest {
  // 请求使用的模型 ID
  string model = 1;

  // 历史对话列表，包含当前用户发送的最新的消息
  repeated Message messages = 2;
}

// ChatResponse 定义后端回传的流式响应契约
message ChatResponse {
  // 当前流式传输的文本片段（如果是最后一个包，此字段可能为空）
  string content = 1;

  // 标识回复是否已结束
  bool is_finished = 2;

  // 错误状态：前端应优先检查 status.code 是否为 0
  Status status = 3;

  // 附加元数据：建议只在第一包或最后一包中携带，用于信息同步
  ResponseMetadata meta = 4;
}

// 服务接口定义（为未来平滑迁移到 gRPC 网络版预留）
service ChatService {
  // 发送对话请求，并接收一个流式的响应序列
  rpc Send(ChatRequest) returns (stream ChatResponse);
}
