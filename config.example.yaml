# 应用配置文件示例
app:
  name: "NeoCode"
  version: "1.0.0"

ai:
  provider: "openll" # modelscope | deepseek | openll | siliconflow | 豆包大模型 | openai
  api_key: "AI_API_KEY" # environment variable name; falls back to AI_API_KEY when empty
  model: "gpt-5.4"

memory:
  top_k: 5
  min_match_score: 2.2
  max_prompt_chars: 1800
  max_items: 1000
  storage_path: "./data/memory_rules.json"
  persist_types:
    - "user_preference"
    - "project_rule"
    - "code_fact"
    - "fix_recipe"

history:
  short_term_turns: 6

persona:
  file_path: "./configs/persona.txt"

# Notes:
# - Switching provider with /provider <name> resets ai.model to that provider's default model.
# - You can still override the current model at any time with /switch <model>.
